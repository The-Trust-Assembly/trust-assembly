function detectPlatform(url) {
  if (!url) return null;
  const u = url.toLowerCase();

  // Video platforms
  if (u.includes("youtube.com/watch") || u.includes("youtu.be/") || u.includes("youtube.com/shorts")) return PLATFORMS.youtube;
  if (u.includes("tiktok.com")) return PLATFORMS.tiktok;
  if (u.includes("vimeo.com") || u.includes("dailymotion.com") || u.includes("rumble.com") || u.includes("bitchute.com")) return PLATFORMS.youtube;

  // Audio / Podcast — check BEFORE generic youtube/spotify
  if (u.includes("open.spotify.com/episode") || u.includes("open.spotify.com/show")) return PLATFORMS.podcast;
  if (u.includes("podcasts.apple.com")) return PLATFORMS.podcast;
  if (u.includes("soundcloud.com")) return PLATFORMS.podcast;
  if (u.includes("podbean.com") || u.includes("anchor.fm") || u.includes("overcast.fm")) return PLATFORMS.podcast;
  if (u.includes("castbox.fm") || u.includes("pocketcasts.com") || u.includes("pod.link")) return PLATFORMS.podcast;
  if (u.includes("iheart.com/podcast") || u.includes("stitcher.com")) return PLATFORMS.podcast;
  if (u.includes("music.youtube.com") && u.includes("podcast")) return PLATFORMS.podcast;

  // Social — shortform text
  if (u.includes("x.com") || u.includes("twitter.com")) return PLATFORMS.twitter;
  if (u.includes("threads.net")) return PLATFORMS.twitter;
  if (u.includes("bsky.app") || u.includes("bsky.social")) return PLATFORMS.twitter;
  if (u.includes("mastodon.") || u.includes("mstdn.")) return PLATFORMS.twitter;
  if (u.includes("truthsocial.com")) return PLATFORMS.twitter;

  // Substack (notes vs articles)
  if (u.includes("substack.com") && (u.includes("/note") || u.includes("/notes"))) return PLATFORMS.substack_note;
  if (u.includes("substack.com")) return PLATFORMS.substack_article;

  // Social — other
  if (u.includes("reddit.com")) return PLATFORMS.reddit;
  if (u.includes("facebook.com") || u.includes("fb.com") || u.includes("fb.watch")) return PLATFORMS.facebook;
  if (u.includes("instagram.com")) return PLATFORMS.instagram;
  if (u.includes("pinterest.com") || u.includes("pin.it")) return PLATFORMS.instagram;
  if (u.includes("linkedin.com")) return PLATFORMS.linkedin;
  if (u.includes("tumblr.com")) return PLATFORMS.twitter;

  // E-commerce / Product
  if (u.includes("amazon.com") || u.includes("amazon.co.")) return PLATFORMS.product;
  if (u.includes("ebay.com")) return PLATFORMS.product;
  if (u.includes("walmart.com") && (u.includes("/ip/") || u.includes("/product/"))) return PLATFORMS.product;
  if (u.includes("target.com") && u.includes("/p/")) return PLATFORMS.product;
  if (u.includes("bestbuy.com") && u.includes("/site/")) return PLATFORMS.product;
  if (u.includes("etsy.com") && u.includes("/listing/")) return PLATFORMS.product;
  if (u.includes("aliexpress.com") && u.includes("/item/")) return PLATFORMS.product;
  if (u.includes("shopify.com") && u.includes("/products/")) return PLATFORMS.product;

  // Q&A → reddit model (title + body)
  if (u.includes("quora.com")) return PLATFORMS.reddit;
  if (u.includes("stackoverflow.com") || u.includes("stackexchange.com")) return PLATFORMS.reddit;

  // Blog platforms → article
  if (u.includes("medium.com")) return PLATFORMS.substack_article;
  if (u.includes("wordpress.com") || u.includes("wp.com")) return PLATFORMS.article;
  if (u.includes("ghost.io") || u.includes("ghost.org")) return PLATFORMS.article;
  if (u.includes("blogger.com") || u.includes("blogspot.com")) return PLATFORMS.article;

  // News aggregators → article
  if (u.includes("news.google.com") || u.includes("msn.com") || u.includes("news.yahoo.com")) return PLATFORMS.article;
  if (u.includes("flipboard.com") || u.includes("apple.news")) return PLATFORMS.article;

  // Wikipedia → article
  if (u.includes("wikipedia.org")) return PLATFORMS.article;

  // Default to article for any other URL with http
  if (u.startsWith("http")) return PLATFORMS.article;
  return null;
}

// ─── Shared Components ─────────────────────────────────────────────

function Label({ children, style }) {
  return (
    <div style={{
      fontFamily: FONT.mono, fontSize: 10, letterSpacing: "1.5px",
      textTransform: "uppercase", color: COLORS.muted, marginBottom: 6, fontWeight: 500, ...style,
    }}>{children}</div>
  );
}

function Input({ placeholder, value, onChange, multiline, style, redBorder }) {
  const base = {
    width: "100%", boxSizing: "border-box", background: COLORS.inputBg,
    border: `1px solid ${redBorder ? COLORS.redBorder : COLORS.inputBorder}`,
    borderRadius: 0, padding: "10px 12px", fontSize: 14, fontFamily: FONT.sans,
    color: COLORS.text, outline: "none", transition: "border-color 0.2s", ...style,
  };
  if (multiline) {
    return <textarea placeholder={placeholder} value={value} onChange={onChange} rows={3}
      style={{ ...base, resize: "vertical", minHeight: 72 }} />;
  }
  return <input type="text" placeholder={placeholder} value={value} onChange={onChange} style={base} />;
}

function AccordionSection({ number, title, subtitle, isOpen, onToggle, children, highlight }) {
  return (
    <div style={{
      border: `1px solid ${COLORS.border}`, marginBottom: 0, borderBottom: "none",
      background: isOpen ? COLORS.card : "#fdfcf8",
    }}>
      <button onClick={onToggle} style={{
        width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "14px 16px",
        background: "none", border: "none", cursor: "pointer", fontFamily: FONT.mono,
        fontSize: 12, letterSpacing: "2px", textTransform: "uppercase", color: COLORS.text,
        fontWeight: 700, textAlign: "left",
      }}>
        <span style={{ fontFamily: FONT.serif, fontSize: 20, fontWeight: 700,
          color: highlight || COLORS.gold, lineHeight: 1, minWidth: 20 }}>{number}</span>
        <span style={{ flex: 1 }}>
          {title}
          {subtitle && <span style={{ fontWeight: 400, fontSize: 10, color: COLORS.muted,
            marginLeft: 8, letterSpacing: "1px" }}>{subtitle}</span>}
        </span>
        <span style={{ fontSize: 10, color: COLORS.muted }}>{isOpen ? "▲" : "▼"}</span>
      </button>
      {isOpen && <div style={{ padding: "0 16px 20px", animation: "fadeIn 0.2s ease" }}>{children}</div>}
    </div>
  );
}

function renderExtraField(type) {
  switch (type) {
    case "timestamp": return <TimestampField />;
    case "threadPosition": return <ThreadPositionField />;
    case "publication": return <PublicationField />;
    case "referencedLink": return <ReferencedLinkField />;
    case "titleCompany": return <TitleCompanyField />;

    case "visualClaim": return <VisualClaimField />;
    case "podcastFields": return <PodcastFields />;
    case "productFields": return <ProductFields />;
    default: return null;

                {platform.showInlineEdits === "conditional" && (
                  <div style={{ padding: "10px 14px", background: COLORS.cream,
                    border: `1px solid ${COLORS.goldBorder}`, fontFamily: FONT.sans, fontSize: 12,
                    color: COLORS.muted, lineHeight: 1.5 }}>
                    Inline body edits are available for text posts. If this is a link post or image post,
                    use the claims section above instead.
                  </div>
                )}
              </AccordionSection>
            )}

            {/* Section 4: Build the Case */}
            <AccordionSection number={platform.section3Title ? "4" : "3"} title="BUILD THE CASE"
              subtitle="SEARCH OR CREATE" isOpen={openSections[4]} onToggle={() => toggleSection(4)}>
              <div style={{ fontFamily: FONT.sans, fontSize: 13, color: COLORS.muted, lineHeight: 1.6, marginBottom: 16 }}>
                Link existing vault entries to strengthen your {correctionType}, or propose new ones.
                Linked entries are voted on by jurors — each time one survives review, it gains reputation.
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
                {["LINK EXISTING SUBMISSION", "LINK EXISTING VAULT ENTRY"].map(label => (
                  <button key={label} style={{
                    padding: "10px 16px", fontFamily: FONT.mono, fontSize: 10, letterSpacing: "1px",
                    background: "transparent", border: `1px solid ${COLORS.inputBorder}`,
                    color: COLORS.text, cursor: "pointer", textAlign: "left", textTransform: "uppercase",
                  }}>{label}</button>
                ))}
              </div>
              <details style={{ cursor: "pointer" }}>
                <summary style={{ fontFamily: FONT.mono, fontSize: 10, letterSpacing: "1px",
                  color: COLORS.muted, marginBottom: 12, padding: "8px 0" }}>
                  + PROPOSE NEW VAULT ENTRIES
                </summary>
                {[
                  { icon: "⊞", name: "STANDING CORRECTIONS", desc: "— reusable facts",
                    fieldLabel: "FACTUAL ASSERTION",
                    placeholder: 'e.g. "The XYZ recall was a software update, not a physical recall"',
                    addLabel: "+ Add another standing correction" },
                  { icon: "⇆", name: "ARGUMENTS", desc: "— reusable rhetorical or logical tools",
                    fieldLabel: null,
                    placeholder: 'e.g. "When an article cites unnamed experts, the absence of names IS the story."',
                    addLabel: "+ Add another argument" },
                  { icon: "⚜", name: "FOUNDATIONAL BELIEFS", desc: "— axioms your Assembly holds",
                    fieldLabel: null,
                    placeholder: 'e.g. "Every person deserves to make informed decisions based on truthful reporting."',
                    addLabel: "+ Add another belief" },
                ].map(item => (
                  <div key={item.name} style={{ border: `1px solid ${COLORS.border}`, padding: 16, marginBottom: 12 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                      <span style={{ fontSize: 16 }}>{item.icon}</span>
                      <span style={{ fontFamily: FONT.mono, fontSize: 10, letterSpacing: "1.5px",
                        color: COLORS.gold, fontWeight: 600 }}>{item.name}</span>
                      <span style={{ fontFamily: FONT.mono, fontSize: 9, color: COLORS.muted }}>{item.desc}</span>
                    </div>
                    {item.fieldLabel && <Label>{item.fieldLabel}</Label>}
                    <Input multiline placeholder={item.placeholder} />
                    <button style={{ marginTop: 8, fontFamily: FONT.mono, fontSize: 9, color: COLORS.gold,
                      background: "none", border: "none", cursor: "pointer", padding: "4px 0" }}>
                      {item.addLabel}
                    </button>
                  </div>
                ))}
                {/* Translations */}
                <div style={{ border: `1px solid ${COLORS.border}`, padding: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 16 }}>⇔</span>
                    <span style={{ fontFamily: FONT.mono, fontSize: 10, letterSpacing: "1.5px",
                      color: COLORS.gold, fontWeight: 600 }}>TRANSLATIONS</span>
                    <span style={{ fontFamily: FONT.mono, fontSize: 9, color: COLORS.muted }}>
                      — strip spin, jargon, or propaganda</span>
                  </div>
                  <div style={{ fontFamily: FONT.sans, fontSize: 12, color: COLORS.gold,
                    fontWeight: 600, lineHeight: 1.5, marginBottom: 10 }}>
                    Assembly-wide — every citizen sees these wherever the original terms appear.
                  </div>
                  <Label>ORIGINAL PHRASE</Label>
                  <Input placeholder='e.g. "Enhanced interrogation techniques"' style={{ marginBottom: 10 }} />
                  <Label>PLAIN-LANGUAGE REPLACEMENT</Label>
                  <Input placeholder='e.g. "Torture"' />
                  <button style={{ marginTop: 8, fontFamily: FONT.mono, fontSize: 9, color: COLORS.gold,
                    background: "none", border: "none", cursor: "pointer", padding: "4px 0" }}>
                    + Add another translation
                  </button>
                </div>
              </details>
            </AccordionSection>

            <div style={{ borderTop: `1px solid ${COLORS.border}` }} />

            {/* Submit / Save */}
            <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
              <button style={{ flex: 2, padding: "16px 24px",
                background: correctionType === "correction" ? COLORS.red : COLORS.green,
                color: "#fff", border: "none", fontFamily: FONT.mono, fontSize: 12,
                fontWeight: 700, letterSpacing: "2px", cursor: "pointer" }}>Submit for Review</button>
              <button style={{ flex: 1, padding: "16px 24px", background: "transparent",
                color: COLORS.gold, border: `1.5px solid ${COLORS.gold}`, fontFamily: FONT.mono,
                fontSize: 12, fontWeight: 700, letterSpacing: "2px", cursor: "pointer" }}>Save Draft</button>
            </div>

            {platform.juryGracePeriod && (
              <div style={{ marginTop: 16, padding: "10px 14px", background: COLORS.amberLight,
                border: `1px solid ${COLORS.amber}`, fontFamily: FONT.mono, fontSize: 9,
                color: COLORS.amber, letterSpacing: "0.5px", textAlign: "center", lineHeight: 1.5 }}>
                ⏳ This submission will have a {platform.juryGracePeriod.days} jury review window
              </div>
            )}

            <div style={{ fontFamily: FONT.mono, fontSize: 9, color: COLORS.subtle,
              textAlign: "center", marginTop: 12, lineHeight: 1.5 }}>
              Digital Citizens are solely responsible for the content of their submissions.
              The Trust Assembly makes no claims regarding the accuracy of submitted corrections.
            </div>
          </div>
        )}

        {/* Empty state */}
        {!platform && (
          <div style={{ textAlign: "center", padding: "48px 24px", color: COLORS.subtle }}>
            <div style={{ fontFamily: FONT.serif, fontSize: 36, color: COLORS.border, marginBottom: 16 }}>↑</div>
            <div style={{ fontFamily: FONT.serif, fontSize: 18, color: COLORS.muted, marginBottom: 8 }}>
              Paste a URL to begin
            </div>
            <div style={{ fontFamily: FONT.sans, fontSize: 13, color: COLORS.subtle,
              lineHeight: 1.5, maxWidth: 400, margin: "0 auto" }}>
              The form adapts to the content type — articles, social posts, videos, podcasts,
              product listings, and more. Each gets the right fields and labels for its platform.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AdaptiveSubmit));
  </script>
</body>
</html>
