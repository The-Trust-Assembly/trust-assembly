<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FDFBF5;
      color: #2B2B2B;
    }
    .header {
      background: #1B2A4A;
      color: #F0EDE6;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 20px; }
    .header-title { font-size: 15px; font-weight: 700; letter-spacing: 0.03em; }
    .header-motto { font-size: 9px; opacity: 0.6; letter-spacing: 0.1em; text-transform: uppercase; }

    .status {
      padding: 12px 16px;
      font-size: 12px;
      color: #5A5650;
      border-bottom: 1px solid #DCD8D0;
      line-height: 1.5;
    }
    .status-count {
      font-size: 22px;
      font-weight: 700;
      color: #1B2A4A;
      display: block;
      margin-bottom: 2px;
    }
    .status-zero { color: #B0A89C; }

    .corrections-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 8px 12px;
    }
    .correction-item {
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid #DCD8D0;
      border-radius: 3px;
      background: #fff;
    }
    .correction-item.type-correction { border-left: 3px solid #C4573F; }
    .correction-item.type-affirmation { border-left: 3px solid #1B5E3F; }
    .correction-item.type-translation { border-left: 3px solid #D4850A; }

    .meta { font-size: 9px; color: #7A7570; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .headline-old { font-size: 12px; text-decoration: line-through; color: #5A5650; }
    .headline-new { font-size: 13px; font-weight: 700; color: #C4573F; margin-top: 2px; }
    .headline-affirmed { font-size: 13px; font-weight: 700; color: #1B5E3F; }
    .trans-pair { font-size: 12px; margin-top: 2px; }
    .trans-orig { text-decoration: line-through; color: #5A5650; }
    .trans-arrow { color: #D4850A; font-weight: 700; }
    .trans-result { color: #D4850A; font-weight: 700; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #DCD8D0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      font-size: 10px;
      color: #B8963E;
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .footer a:hover { text-decoration: underline; }
    .footer-motto { font-size: 9px; color: #B0A89C; font-style: italic; }

    .loading { text-align: center; padding: 24px; color: #B0A89C; font-size: 12px; }
    .empty {
      text-align: center;
      padding: 24px 16px;
      color: #B0A89C;
      font-size: 12px;
      line-height: 1.6;
    }
    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    .settings {
      padding: 10px 16px;
      border-top: 1px solid #DCD8D0;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 11px;
      color: #5A5650;
    }
    .toggle-row input { margin-left: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">⚖</div>
    <div>
      <div class="header-title">Trust Assembly</div>
      <div class="header-motto">Truth Will Out</div>
    </div>
  </div>

  <div id="content">
    <div class="loading">Checking this page...</div>
  </div>

  <div class="settings">
    <div class="toggle-row">
      <label>Show translations inline</label>
      <input type="checkbox" id="toggle-translations" checked>
    </div>
    <div class="toggle-row">
      <label>Show floating badge</label>
      <input type="checkbox" id="toggle-badge" checked>
    </div>
  </div>

  <div style="padding: 8px 16px; font-size: 9px; color: #7A7570; line-height: 1.5; border-top: 1px solid #DCD8D0; background: #F0EDE6;">
    🔒 <strong>Privacy:</strong> This extension sends the current page URL to check for corrections. We do not log, store, or track which pages you visit. No browsing history. No IP logging. No analytics. <a href="https://trustassembly.org/extensions" target="_blank" style="color: #2A6B6B;">Learn more</a>
  </div>

  <div class="footer">
    <a href="https://trustassembly.org" target="_blank">trustassembly.org</a>
    <span class="footer-motto">Truth Will Out.</span>
  </div>

  <script src="api-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
